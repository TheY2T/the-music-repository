# pnpm workspaces + catalogs — single source of truth for shared dependency versions.
# Reference from any package.json with the `catalog:` protocol, e.g. "zod": "catalog:".
packages:
  - "apps/*"
  - "packages/*"

catalog:
  # --- Tooling ---
  # TypeScript pinned to the 5.x line for NestJS/Astro tooling compatibility (7.x is too new).
  typescript: ^5.7.3
  turbo: ^2.10.4
  "@biomejs/biome": ^2.5.3
  "@types/node": ^22.10.5
  # Vitest pinned to 3.2.x: AST-remapped v8 coverage + `projects` API without the v4 major-bump
  # integration risk against Astro getViteConfig / unplugin-swc. See ADR 0020 (v4 is a future bump).
  vitest: ^3.2.0
  # ESLint pinned to 9.x (what typescript-eslint 8 supports; 10.x not yet supported).
  eslint: ^9.18.0
  typescript-eslint: ^8.20.0
  # 1.x supports ESLint 9 (2.x requires ESLint 10, which typescript-eslint 8 doesn't support).
  "eslint-plugin-astro": ^1.3.1

  # --- Shared runtime libs ---
  zod: ^4.4.3
  tsup: ^8.5.1

  # --- Catalogue (Phase 1): search + object storage ---

  # --- Auth (Phase 1 Slice 2): Better Auth ---
  "better-auth": ^1.6.23
  "@thallesp/nestjs-better-auth": ^2.7.0
  # Signs Apple's ES256 OAuth client-secret JWT.
  jose: ^6.2.3

  # --- Admin CMS (Slice 2b): markdown preview ---
  marked: ^15.0.7
  # --- LLM ingestion (llms.txt + Accept: text/markdown): HTML → markdown conversion ---
  node-html-markdown: ^1.3.0

  # --- Block editor (ADR 0030): TipTap / ProseMirror. Pinned as a group so the pm bundle stays single. ---
  "@tiptap/core": ^2.11.5
  "@tiptap/react": ^2.11.5
  "@tiptap/pm": ^2.11.5
  "@tiptap/starter-kit": ^2.11.5
  "@tiptap/extension-link": ^2.11.5
  "@tiptap/extension-placeholder": ^2.11.5
  "@tiptap/extension-table": ^2.11.5
  "@tiptap/extension-table-row": ^2.11.5
  "@tiptap/extension-table-header": ^2.11.5
  "@tiptap/extension-table-cell": ^2.11.5

  # --- Drag-and-drop for non-prose sortable lists (ADR 0030): collection sections/items ---
  "@dnd-kit/core": ^6.3.1
  "@dnd-kit/sortable": ^10.0.0
  "@dnd-kit/utilities": ^3.2.2

  # --- Feature flags (OpenFeature + flagd) ---
  "@openfeature/server-sdk": ^1.22.0
  "@openfeature/nestjs-sdk": ^0.2.7
  "@openfeature/web-sdk": ^1.9.0
  "@openfeature/react-sdk": ^1.4.1

  # --- Database (Drizzle + Postgres) ---
  "drizzle-orm": ^0.45.2
  "drizzle-kit": ^0.31.10
  postgres: ^3.4.9

  # --- Backend (NestJS) ---
  "@nestjs/common": ^11.1.28
  "@nestjs/core": ^11.1.28
  "@nestjs/platform-express": ^11.1.28
  "@nestjs/config": ^4.0.4
  "@nestjs/testing": ^11.1.28
  "reflect-metadata": ^0.2.2
  rxjs: ^7.8.2

  # --- Frontend (Astro + React + Tailwind) ---
  astro: ^7.0.7
  "@astrojs/node": ^11.0.2
  "@astrojs/react": ^6.0.1
  "@astrojs/check": ^0.9.9
  react: ^19.2.7
  "react-dom": ^19.2.7
  "@types/react": ^19.2.17
  "@types/react-dom": ^19.2.3
  tailwindcss: ^4.3.2
  "@tailwindcss/vite": ^4.3.2
  "@tailwindcss/typography": ^0.5.16
  tw-animate-css: ^1.4.0
  # Icons: astro-icon renders Lucide as zero-JS inline SVG in .astro (React islands use lucide-react).
  "astro-icon": ^1.1.5
  "@iconify-json/lucide": ^1.2.68

  # UI helpers (shadcn/ui)
  clsx: ^2.1.1
  "tailwind-merge": ^3.6.0
  "class-variance-authority": ^0.7.1
  "lucide-react": ^0.545.0

  # Dashboard-spaces WYSIWYG grid engine (ADR 0046): draggable/resizable 2-D widget layout.
  # Classic STRML API (WidthProvider HOC, cols/rowHeight/isDraggable); v1.3+ uses nodeRef so it is
  # React 19 safe (no findDOMNode). See the compat smoke test in common-ui.
  "react-grid-layout": ^1.5.2
  "@types/react-grid-layout": ^1.3.5

  # --- PixiJS rendering layer (ADR 0022): client-only WebGL canvas for interactive tools,
  # audio-reactive visualizers, notation overlay + ambient polish. @pixi/react v8 peers pixi.js
  # ^8.2.6 + react >=19. Cataloged so apps/web (and later @TheY2T/tmr-ui) resolve ONE copy —
  # mismatched pixi.js copies break extend()/instanceof. Lazy-loaded per island (never global).
  "pixi.js": ^8.19.0
  "@pixi/react": ^8.0.5

  # --- Music notation (alphaTab): the SINGLE score engine (ADR 0027) — renders standard notation
  # (piano grand staff) + tablature (guitar) and owns its own synth, cursor, and A–B loop. Also the
  # authoring toolchain: apps/api converts MusicXML → alphaTex + validates via its importer/exporter.
  # Pinned to an EXACT version: the Vite plugin copies version-matched Bravura font + soundfont assets
  # to /font + /soundfont, and the engine self-hosts them from those paths (no CDN). Lazy-loaded, NOT
  # in optimizeDeps (dup-React caveat, like pixi/smplr). ---
  "@coderline/alphatab": 1.8.4
  # The Vite build plugin ships as its own package now (the `@coderline/alphatab/vite` subpath in the
  # main package is a broken re-export in 1.8.4). Keep it version-locked to the engine.
  "@coderline/alphatab-vite": 1.8.4

  # --- Design tokens: self-hosted vintage typefaces (@fontsource, no external CDN) ---
  # One display + one body face per aesthetic (ADR 0021). Variable where available to keep the
  # footprint to a single file per family.
  "@fontsource-variable/fraunces": ^5.2.5
  "@fontsource-variable/playfair-display": ^5.2.5
  "@fontsource-variable/newsreader": ^5.2.5
  "@fontsource-variable/source-sans-3": ^5.2.5
  "@fontsource-variable/inter": ^5.2.5
  "@fontsource/libre-baskerville": ^5.2.5
  "@fontsource/ibm-plex-mono": ^5.2.5

  # --- Design system (@TheY2T/tmr-ui): Storybook workbench ---
  storybook: ^9.1.15
  "@storybook/react-vite": ^9.1.15

  # --- Platform: spec-first API pipeline (TypeSpec → OpenAPI → Orval/Zod) ---
  "@typespec/compiler": ^1.13.0
  "@typespec/http": ^1.13.0
  "@typespec/openapi3": ^1.13.0
  orval: ^8.20.0
  "nestjs-zod": ^5.4.0
  "@redocly/cli": ^2.38.0
  "openapi-zod-client": ^1.18.3
  "@tanstack/react-query": ^5.101.2

  # --- Platform: error handling & cross-cutting ---
  "eslint-plugin-boundaries": ^7.0.2
  "nestjs-cls": ^6.2.1

  # --- Platform: observability (OpenTelemetry + Pino) ---
  "@opentelemetry/api": ^1.9.1
  "@opentelemetry/sdk-node": ^0.220.0
  "@opentelemetry/sdk-trace-base": ^2.9.0
  "@opentelemetry/sdk-metrics": ^2.9.0
  "@opentelemetry/resources": ^2.9.0
  "@opentelemetry/semantic-conventions": ^1.43.0
  "@opentelemetry/auto-instrumentations-node": ^0.78.0
  "@opentelemetry/exporter-trace-otlp-grpc": ^0.220.0
  "@opentelemetry/exporter-metrics-otlp-grpc": ^0.220.0
  "@opentelemetry/instrumentation-pino": ^0.66.0
  "nestjs-otel": ^8.1.0
  "nestjs-pino": ^4.6.1
  pino: ^10.3.1
  "pino-http": ^11.0.0
  "pino-pretty": ^13.1.3
  "pino-opentelemetry-transport": ^3.0.0

  # --- Testing (ADR 0020 · docs/features/testing.md) ---
  # Unit/component: Vitest (above) + Testing Library + happy-dom. E2E: Playwright + axe.
  # API integration: Testcontainers + Supertest. E2E backend mocking: MSW.
  "@vitest/coverage-v8": ^3.2.0
  "happy-dom": ^15.11.0
  jsdom: ^25.0.1
  "@testing-library/react": ^16.1.0
  "@testing-library/user-event": ^14.5.2
  "@testing-library/jest-dom": ^6.6.3
  "@playwright/test": ^1.49.0
  "@axe-core/playwright": ^4.10.1
  supertest: ^7.0.0
  "@types/supertest": ^6.0.2
  testcontainers: ^10.16.0
  "@testcontainers/postgresql": ^10.16.0
  # NestJS decorator metadata under Vitest + tsconfig path resolution.
  "unplugin-swc": ^1.5.1
  "vite-tsconfig-paths": ^5.1.4
  # E2E backend mocking (MSW node server intercepts Astro SSR fetch).
  msw: ^2.7.0
