# Single podman-compose stack: Postgres + API + web (feature flags are DB-backed — no flagd, ADR 0035).
# Run from the repo root:  podman compose -f infra/podman/compose.yaml up
# Or just the deps for local dev:  podman compose -f infra/podman/compose.yaml up -d db
name: the-music-repository

# Shared build + env for the api image, reused by the `api` service and the one-shot `init` (migrate +
# seed) service so they stay in lockstep. The DB host points at the compose service name.
x-api-build: &api-build
  context: ../..
  dockerfile: apps/api/Dockerfile

x-app-env: &app-env
  NODE_ENV: production
  DATABASE_URL: postgres://${POSTGRES_USER:-tmr}:${POSTGRES_PASSWORD:-tmr}@db:5432/${POSTGRES_DB:-tmr}
  # Feature-flag environment this deployment resolves against (matches a feature_flag_environments.key).
  APP_ENV: ${APP_ENV:-dev}
  # Local is a dev environment (the image runs NODE_ENV=production, which would otherwise force the
  # Better Auth rate limiter on and throttle rapid local/E2E sign-ins). Off locally; the prod compose
  # sets it true.
  AUTH_RATE_LIMIT_ENABLED: "false"
  # Search (Meilisearch) + object storage (MinIO, an S3-compatible stand-in for Cloudflare R2). These
  # point at the app-profile services below, so `pnpm app:up` exercises the same adapters as production.
  MEILI_HOST: http://meilisearch:7700
  MEILI_API_KEY: ${MEILI_MASTER_KEY:-masterKey}
  MEILI_INDEX_PREFIX: ${APP_ENV:-dev}
  R2_ENDPOINT: http://minio:9000
  R2_REGION: us-east-1
  R2_ACCESS_KEY_ID: ${MINIO_ROOT_USER:-minioadmin}
  R2_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
  R2_BUCKET: ${R2_BUCKET:-tmr-media}
  # Browser-facing read URL (MinIO published on the host).
  R2_PUBLIC_URL: http://localhost:9000/${R2_BUCKET:-tmr-media}
  MEDIA_PUBLIC_URL: http://localhost:9000/${R2_BUCKET:-tmr-media}

services:
  db:
    image: docker.io/library/postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-tmr}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-tmr}
      POSTGRES_DB: ${POSTGRES_DB:-tmr}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-tmr} -d ${POSTGRES_DB:-tmr}"]
      interval: 5s
      timeout: 5s
      retries: 10

  # Search + object storage — part of the `app` layer so `pnpm app:up` runs the full stack.
  meilisearch:
    profiles: ["app"]
    image: docker.io/getmeili/meilisearch:v1.12
    environment:
      MEILI_MASTER_KEY: ${MEILI_MASTER_KEY:-masterKey}
      MEILI_ENV: development
    ports:
      - "7700:7700"
    volumes:
      - meili_data:/meili_data

  minio:
    profiles: ["app"]
    image: docker.io/minio/minio:latest
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  # One-shot: create the media bucket and make it publicly readable (mirrors R2's public custom
  # domain), so media links resolve in the browser without per-run manual setup.
  minio-setup:
    profiles: ["app"]
    image: docker.io/minio/mc:latest
    depends_on:
      minio:
        condition: service_started
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
      R2_BUCKET: ${R2_BUCKET:-tmr-media}
    entrypoint:
      - sh
      - -c
      - >-
        until mc alias set local http://minio:9000 "$${MINIO_ROOT_USER}" "$${MINIO_ROOT_PASSWORD}";
        do echo '[minio-setup] waiting for minio'; sleep 2; done &&
        mc mb -p "local/$${R2_BUCKET}" &&
        mc anonymous set download "local/$${R2_BUCKET}"
    restart: "no"

  # api + web + init are the "app" layer — opted into with `--profile app` (pnpm app:up).
  # Without the profile, `docker compose up` starts only the backing services above (pnpm infra:up).

  # One-shot bootstrap: apply Drizzle migrations, then seed local dev accounts + catalogue content.
  # The api waits for this to finish successfully, so a fresh volume comes up migrated + signable-into.
  # All three steps need only Postgres and are idempotent. Local/demo only — seeds insecure dev creds.
  init:
    profiles: ["app"]
    image: tmr-api:local
    build: *api-build
    environment: *app-env
    # The content seed stays best-effort so a miss never blocks sign-in (re-run: pnpm app:seed).
    command:
      - sh
      - -c
      - >-
        until wget -qO- http://meilisearch:7700/health >/dev/null 2>&1;
        do echo '[init] waiting for meilisearch'; sleep 2; done &&
        pnpm --filter @TheY2T/tmr-api db:migrate &&
        pnpm --filter @TheY2T/tmr-api db:seed:auth &&
        { pnpm --filter @TheY2T/tmr-api db:seed
        || echo '[init] content seed failed — sign-in still works; re-run: pnpm app:seed'; }
    depends_on:
      db:
        condition: service_healthy
      meilisearch:
        condition: service_started
      minio-setup:
        condition: service_completed_successfully
    restart: "no"

  api:
    profiles: ["app"]
    image: tmr-api:local
    build: *api-build
    environment:
      <<: *app-env
      PORT: "3000"
    depends_on:
      init:
        condition: service_completed_successfully
      db:
        condition: service_healthy
      meilisearch:
        condition: service_started
      minio:
        condition: service_started
    ports:
      - "3000:3000"
    healthcheck:
      # busybox wget ships in node:22-alpine; the health route has no global prefix.
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  web:
    profiles: ["app"]
    build:
      context: ../..
      dockerfile: apps/web/Dockerfile
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: "4321"
      # Browser talks to the API on the host-published port (baked into the client bundle at build).
      PUBLIC_API_BASE_URL: http://localhost:3000
      # SSR (session check in middleware) talks to the API over the compose network — localhost:3000
      # inside this container would be the web container itself, so the session check would always fail.
      API_INTERNAL_URL: http://api:3000
      # SSR resolves flags from the API's DB-backed snapshot (GET /feature-flags/snapshot/:env).
      APP_ENV: ${APP_ENV:-dev}
    depends_on:
      # Wait until the API is actually serving so first-paint SSR data fetches (flags, session) succeed.
      api:
        condition: service_healthy
    ports:
      - "4321:4321"

  # Design-system Storybook (@TheY2T/tmr-ui) — a static build served by nginx on 6006. Self-contained
  # (components are presentational, no API/DB), so it has no depends_on. Part of the `app` profile, so
  # it comes up with `pnpm app:up` and is torn down by `pnpm app:down`.
  storybook:
    profiles: ["app"]
    build:
      context: ../..
      dockerfile: packages/ui/Dockerfile
    ports:
      - "6006:6006"

volumes:
  pgdata:
  meili_data:
  minio_data:
