# Single podman-compose stack: Postgres + flagd + API + web.
# Run from the repo root:  podman compose -f infra/podman/compose.yaml up
# Or just the deps for local dev:  podman compose -f infra/podman/compose.yaml up -d db flagd
name: the-music-repository

# Shared build + env for the api image, reused by the `api` service and the one-shot `init` (migrate +
# seed) service so they stay in lockstep. DB/search/storage hosts point at compose service names.
x-api-build: &api-build
  context: ../..
  dockerfile: apps/api/Dockerfile

x-app-env: &app-env
  NODE_ENV: production
  DATABASE_URL: postgres://${POSTGRES_USER:-tmr}:${POSTGRES_PASSWORD:-tmr}@db:5432/${POSTGRES_DB:-tmr}
  FLAGD_HOST: flagd
  FLAGD_PORT: "8013"
  MEILI_HOST: http://meilisearch:7700
  MEILI_MASTER_KEY: ${MEILI_MASTER_KEY:-tmr_dev_master_key}
  S3_ENDPOINT: http://minio:9000
  # Presigned URLs must be reachable by the browser (host-published), not the compose hostname.
  S3_PUBLIC_ENDPOINT: http://localhost:9000
  S3_REGION: us-east-1
  S3_ACCESS_KEY_ID: ${MINIO_ROOT_USER:-tmr}
  S3_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD:-tmrsecret}
  S3_BUCKET: ${S3_BUCKET:-tmr-media}

services:
  db:
    image: docker.io/library/postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-tmr}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-tmr}
      POSTGRES_DB: ${POSTGRES_DB:-tmr}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-tmr} -d ${POSTGRES_DB:-tmr}"]
      interval: 5s
      timeout: 5s
      retries: 10

  flagd:
    image: ghcr.io/open-feature/flagd:latest
    # gRPC evaluation on 8013, OFREP (HTTP) on 8016. Flags hot-reload from the mounted file.
    command: ["start", "--uri", "file:/etc/flagd/flags.json"]
    ports:
      - "8013:8013"
      - "8016:8016"
    volumes:
      # :Z relabels for SELinux (Fedora/RHEL); harmless elsewhere.
      - ../../flags/flags.json:/etc/flagd/flags.json:ro,Z

  # Catalogue search engine (faceted, typo-tolerant). Console/API on 7700.
  meilisearch:
    image: docker.io/getmeili/meilisearch:latest
    environment:
      MEILI_MASTER_KEY: ${MEILI_MASTER_KEY:-tmr_dev_master_key}
      MEILI_ENV: development
    ports:
      - "7700:7700"
    volumes:
      - meilidata:/meili_data

  # Media object storage (S3-compatible). S3 API on 9000, console on 9001.
  minio:
    image: docker.io/minio/minio:latest
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-tmr}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-tmrsecret}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data

  # api + web + init are the "app" layer — opted into with `--profile app` (pnpm app:up).
  # Without the profile, `docker compose up` starts only the backing services above (pnpm infra:up).

  # One-shot bootstrap: apply Drizzle migrations, then seed local dev accounts + catalogue content.
  # The api waits for this to finish successfully, so a fresh volume comes up migrated + signable-into.
  # All three steps are idempotent (re-running is safe). Local/demo only — seeds insecure dev creds.
  init:
    profiles: ["app"]
    image: tmr-api:local
    build: *api-build
    environment: *app-env
    # migrate + auth seed only need Postgres, so they gate the api; the content seed also needs
    # Meilisearch/MinIO ready, so it's best-effort — a miss never blocks sign-in (re-run: pnpm app:seed).
    command:
      - sh
      - -c
      - >-
        pnpm --filter @TheY2T/tmr-api db:migrate &&
        pnpm --filter @TheY2T/tmr-api db:seed:auth &&
        { pnpm --filter @TheY2T/tmr-api db:seed
        || echo '[init] content seed failed (Meilisearch/MinIO not ready yet) — sign-in still works; re-run: pnpm app:seed'; }
    depends_on:
      db:
        condition: service_healthy
      meilisearch:
        condition: service_started
      minio:
        condition: service_started
    restart: "no"

  api:
    profiles: ["app"]
    image: tmr-api:local
    build: *api-build
    environment:
      <<: *app-env
      PORT: "3000"
    depends_on:
      init:
        condition: service_completed_successfully
      db:
        condition: service_healthy
      flagd:
        condition: service_started
      meilisearch:
        condition: service_started
      minio:
        condition: service_started
    ports:
      - "3000:3000"
    healthcheck:
      # busybox wget ships in node:22-alpine; the health route has no global prefix.
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  web:
    profiles: ["app"]
    build:
      context: ../..
      dockerfile: apps/web/Dockerfile
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: "4321"
      # Browser talks to the API on the host-published port (baked into the client bundle at build).
      PUBLIC_API_BASE_URL: http://localhost:3000
      # SSR (session check in middleware) talks to the API over the compose network — localhost:3000
      # inside this container would be the web container itself, so the session check would always fail.
      API_INTERNAL_URL: http://api:3000
      # SSR talks to flagd over the compose network.
      FLAGD_HOST: flagd
      FLAGD_PORT: "8013"
    depends_on:
      # Wait until the API is actually serving so first-paint SSR data fetches succeed.
      api:
        condition: service_healthy
      flagd:
        condition: service_started
    ports:
      - "4321:4321"

  # Design-system Storybook (@TheY2T/tmr-ui) — a static build served by nginx on 6006. Self-contained
  # (components are presentational, no API/DB), so it has no depends_on. Part of the `app` profile, so
  # it comes up with `pnpm app:up` and is torn down by `pnpm app:down`.
  storybook:
    profiles: ["app"]
    build:
      context: ../..
      dockerfile: packages/ui/Dockerfile
    ports:
      - "6006:6006"

volumes:
  pgdata:
  meilidata:
  miniodata:
