# Render Blueprint — private dev environment for The Music Repository.
# Three managed resources: the API (NestJS), the web app (Astro SSR), and a managed Postgres.
# Shared secrets (SMTP_URL, MAIL_FROM, …) live in the `dev` environment group; env-specific wiring is
# inline. Web ↔ API server-side traffic uses Render's private network (API_INTERNAL_URL), so it is not
# affected by the Cloudflare Access gate on the public hostnames. Validate with `render blueprints validate`.

databases:
  - name: tmr-db-dev
    databaseName: tmr
    user: tmr
    plan: basic-256mb
    region: oregon
    postgresMajorVersion: "16"

services:
  # --- API (NestJS) ---
  - type: web
    name: tmr-api-dev
    runtime: docker
    repo: https://github.com/TheY2T/the-music-repository
    branch: main
    region: oregon
    plan: starter
    dockerfilePath: apps/api/Dockerfile
    dockerContext: .
    healthCheckPath: /health
    autoDeployTrigger: commit
    # Apply migrations + seed before each deploy goes live (all idempotent, chained in the db:deploy
    # script so the shell operators run under a shell, not as arguments to the first command).
    preDeployCommand: pnpm --filter @TheY2T/tmr-api db:deploy
    envVars:
      - key: PORT
        value: "3000"
      - key: NODE_ENV
        value: production
      - key: APP_ENV
        value: dev
      - key: DATABASE_URL
        fromDatabase:
          name: tmr-db-dev
          property: connectionString
      - key: BETTER_AUTH_SECRET
        generateValue: true
      - key: BETTER_AUTH_URL
        value: https://api.themusicrepository.com
      - key: AUTH_COOKIE_DOMAIN
        value: .themusicrepository.com
      - key: TRUSTED_ORIGINS
        value: https://themusicrepository.com,https://www.themusicrepository.com,https://api.themusicrepository.com
      - key: WEB_BASE_URL
        value: https://themusicrepository.com
      - key: MEDIA_PUBLIC_URL
        value: https://api.themusicrepository.com
      # Persist rate-limit counters in Postgres so limits hold across instances.
      - key: AUTH_RATE_LIMIT_ENABLED
        value: "true"
      # Shared dev group carries SMTP_URL + MAIL_FROM (Resend) and the social-provider secrets
      # (GOOGLE_/FACEBOOK_CLIENT_ID+SECRET — set them there, not inline, since they're secrets).
      - fromGroup: dev

  # --- Web (Astro SSR) ---
  - type: web
    name: tmr-web-dev
    runtime: docker
    repo: https://github.com/TheY2T/the-music-repository
    branch: main
    region: oregon
    plan: starter
    dockerfilePath: apps/web/Dockerfile
    dockerContext: .
    autoDeployTrigger: commit
    envVars:
      - key: PORT
        value: "4321"
      - key: NODE_ENV
        value: production
      - key: APP_ENV
        value: dev
      # Server-side calls to the API over Render's private network (bypasses the Cloudflare Access gate).
      - key: API_INTERNAL_URL
        value: http://tmr-api-dev:3000
      # Build-time public config (baked into the client bundle + Astro.site via matching Dockerfile ARGs).
      - key: PUBLIC_API_BASE_URL
        value: https://api.themusicrepository.com
      - key: PUBLIC_SITE_URL
        value: https://themusicrepository.com
      - fromGroup: dev
